syntax = "proto3";

option java_package = "com.snowflake.apps.streamlit";
option java_outer_classname = "GapSizeProto";

package streamlit;

enum GapSize {
  GAP_UNDEFINED = 0;
  SMALL = 1;
  MEDIUM = 2;
  LARGE = 3;
  NONE = 4;
  XXSMALL = 5;
  XSMALL = 6;
  XLARGE = 7;
  XXLARGE = 8;
}

message GapConfig {
  oneof gap_spec {
    GapSize gap_size = 1;
  }
}
