---
name: Run Semgrep Checks

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths-ignore:
      # Don't run CI if changes are only in the specs folder:
      - "specs/**"
      # Don't run CI if changes are only in the agent-knowledge folder:
      - "agent-knowledge/**"

permissions:
  contents: read

jobs:
  run-semgrep-reusable-workflow:
    uses: snowflakedb/reusable-workflows/.github/workflows/semgrep-v2.yml@main
    secrets:
      token: ${{ secrets.SEMGREP_APP_TOKEN }}
