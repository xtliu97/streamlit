# AI Issue Triage workflow uses Cursor CLI to analyze and triage GitHub issues
name: AI Issue Triage

on:
  issues:
    types: [labeled]
  workflow_dispatch:
    inputs:
      issue_number:
        description: "Issue number to triage"
        required: true
        type: number
      model:
        description: "Model to use for the triage"
        required: false
        type: string
        default: "opus-4.5-thinking"

# Computed issue number and model for use in jobs
env:
  ISSUE_NUMBER: ${{ github.event.inputs.issue_number || github.event.issue.number }}
  MODEL: ${{ github.event.inputs.model || 'opus-4.5-thinking' }}

jobs:
  # Job 1: AI performs the triage analysis with READ-ONLY access
  ai-issue-triage:
    if: github.event_name == 'workflow_dispatch' || github.event.label.name == 'ai-review'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      # Do not give the agent write access to keep it a safe operation
      contents: read
      issues: read

    # Avoid duplicate workflows on same issue (use issue number for per-issue isolation)
    concurrency:
      group: ${{ github.workflow }}-${{ github.event.inputs.issue_number || github.event.issue.number }}-ai-triage
      cancel-in-progress: true

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout Streamlit code
        uses: actions/checkout@v6
        with:
          persist-credentials: false
          submodules: "recursive"
          # Give the agent full git history access:
          fetch-depth: 0

      - name: Install Cursor CLI
        run: |
          curl https://cursor.com/install -fsS | bash
          echo "$HOME/.cursor/bin" >> $GITHUB_PATH

      - name: Download open issues CSV
        run: |
          if ! curl -sfL "https://raw.githubusercontent.com/streamlit/st-issues/refs/heads/main/static/github_issues_open_cleaned_all_summarized.csv" -o open_issues.csv; then
            echo "Error: Failed to download issues CSV"
            exit 1
          fi
          if [ ! -s open_issues.csv ]; then
            echo "Error: Downloaded CSV is empty"
            exit 1
          fi

      - name: Get issue details
        id: issue-info
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ISSUE_DATA=$(gh api repos/${{ github.repository }}/issues/${{ env.ISSUE_NUMBER }})
          echo "html_url=$(echo "$ISSUE_DATA" | jq -r '.html_url')" >> $GITHUB_OUTPUT
          echo "title=$(echo "$ISSUE_DATA" | jq -r '.title')" >> $GITHUB_OUTPUT

      # Runs only very basic triage (first-level support) based on the
      # issue information and historical issues. This will detect
      # related issues / duplicates, suggest feature labels, and gives
      # a brief initial assessment of the issue. We will add more advanced
      # issue analysis in future iterations.
      - name: "AI Issue Triage - Duplicates & Labels"
        env:
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_URL: ${{ steps.issue-info.outputs.html_url }}
          ISSUE_TITLE: ${{ steps.issue-info.outputs.title }}
        run: |
          cursor-agent -p "You are operating in a GitHub Actions runner to triage a GitHub issue.

          The GitHub CLI (gh) is available for READ operations only. Use it to fetch issue details and search
          for related issues. Git is also available for read operations. The repository is available in the
          current directory with the full git history, but the dev environment is not setup, so you cannot run
          the code or development tasks.

          # Context:
          - Repo: ${{ github.repository }}
          - Issue Number: ${{ env.ISSUE_NUMBER }}
          - Issue URL: $ISSUE_URL
          - Issue Title: $ISSUE_TITLE

          # Available Resources:
          - A CSV file 'open_issues.csv' in the current directory contains all open issues with summaries. Use this to find duplicate or related issues.
          - Use 'gh label list -L 300' to get all existing labels in the repository. ONLY use labels that exist.
          - Use 'gh issue view ${{ env.ISSUE_NUMBER }}' to get full issue details.
          - Use 'gh search issues' to search for related issues if needed.
          - Other read-only operations are available via 'gh' client or `git` command.

          # Goal:
          Analyze this issue and prepare triage information including appropriate labels and related issues.

          # Instructions:

          1. First, get the full issue details:
             - Run 'gh issue view ${{ env.ISSUE_NUMBER }}' to get the issue body and metadata.

          2. Get all existing labels:
             - Run 'gh label list -L 300' to get all valid labels.
             - You MUST only use labels from this list.

          3. Read the open_issues.csv file to understand existing issues, their descriptions, the applied labels.

          4. Analyze the issue:
             - Determine the issue type (bug, enhancement, question, etc.)
             - Identify the relevant feature area(s)
             - Find up to 3 potentially duplicates or existing issues that are closely related to this issue (${{ env.ISSUE_NUMBER }}).
               Its fine to also suggest 0 issues if no related issues or duplicates are found.

          5. For BUG issues specifically:
             - Perform a quick root cause analysis by examining the codebase
             - Look at relevant code files mentioned in the issue or related to the feature
             - Summarize your findings about the potential cause

          6. Create 'labels.txt':
             - One label per line
             - Only include labels that exist in 'gh label list -L 300'
             - Please focus on adding one type label (type:*) and relevant feature labels (feature:st.*, area:*), no other type of labels.

          7. Create 'comment.txt':
             - Start with a brief summary (~2-7 sentences) of the issue analysis
             - List up to 3 potentially duplicate or closely related issues with links and brief explanations of why they're related
             - Be concise but informative
             - Use GitHub-flavored markdown formatting

          # Output Format for comment.txt:

          <output-start>
          [Brief analysis of what this issue is about and the potential root cause if applicable.]

          ### Related Issues

          [List of up to 3 related issues with links and brief explanations. If no related issues found, state that.]

          ---
          *This is an automated triage comment. Please verify the suggested labels and related issues.*
          <output-end>

          # Important Notes:
          - Do NOT attempt to post comments, edit issues, or perform any write operations - they will fail.
          - Do NOT run test, lint, or build commands (the dev environment is not setup!).
          - Focus on analysis and generating the output files.
          " --force --model "${{ env.MODEL }}" --output-format=text

      - name: Upload triage artifacts
        uses: actions/upload-artifact@v6
        with:
          name: triage-output
          path: |
            labels.txt
            comment.txt
          retention-days: 1

  # Job 2: Post the triage results with WRITE access (no agent)
  ai-issue-post-triage:
    needs: ai-issue-triage
    # Run on success or failure, but NOT when skipped (i.e., label wasn't 'ai-review')
    if: always() && needs.ai-issue-triage.result != 'skipped'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write

    steps:
      - name: Remove 'ai-review' label
        if: github.event_name == 'issues'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue edit ${{ env.ISSUE_NUMBER }} --remove-label "ai-review" --repo ${{ github.repository }}

      - name: Download triage artifacts
        id: download
        uses: actions/download-artifact@v7
        continue-on-error: true
        with:
          name: triage-output

      - name: Apply labels
        if: steps.download.outcome == 'success'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ ! -f labels.txt ]; then
            echo "Warning: labels.txt not found, skipping label application"
            exit 0
          fi

          # Only add new labels from labels.txt, never remove existing ones
          while IFS= read -r label || [ -n "$label" ]; do
            # Skip empty lines
            if [ -n "$label" ]; then
              echo "Adding label: $label"
              gh issue edit ${{ env.ISSUE_NUMBER }} --add-label "$label" --repo ${{ github.repository }} || echo "Warning: Failed to add label '$label'"
            fi
          done < labels.txt

      - name: Post triage comment
        if: steps.download.outcome == 'success'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ ! -f comment.txt ]; then
            echo "Warning: comment.txt not found, skipping comment"
            exit 0
          fi
          gh issue comment ${{ env.ISSUE_NUMBER }} --body-file comment.txt --repo ${{ github.repository }}

      - name: Post failure notice
        if: steps.download.outcome == 'failure'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue comment ${{ env.ISSUE_NUMBER }} --body "⚠️ **AI Triage Failed**

          The AI triage job failed to complete. Please check the [workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) for details.

          You can retry by adding the \`ai-review\` label again or manually triggering the workflow." --repo ${{ github.repository }}
