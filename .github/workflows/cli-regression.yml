name: CLI Regression

on:
  push:
    branches:
      - "develop"
  pull_request:
    types: [opened, synchronize, reopened]
    paths-ignore:
      # Don't run CI if changes are only in the specs folder:
      - "specs/**"
      # Don't run CI if changes are only in the agent-knowledge folder:
      - "agent-knowledge/**"

# Avoid duplicate workflows on same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  cli-regression:
    runs-on: ubuntu-latest

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout Streamlit code
        uses: actions/checkout@v5
        with:
          persist-credentials: false
          submodules: "recursive"
          fetch-depth: 2
      - name: Set Python version vars
        uses: ./.github/actions/build_info
      - name: Set up Python ${{ env.PYTHON_MAX_VERSION }}
        uses: actions/setup-python@v6
        with:
          python-version: "${{ env.PYTHON_MAX_VERSION }}"
      - name: Setup virtual env
        uses: ./.github/actions/make_init
      - name: Build Package - Fast
        timeout-minutes: 120
        run: |
          sudo apt install rsync
          make package
      - name: Install streamlit in production mode
        run: |
          pip install -U ./lib
      - name: Run CLI regression tests
        run: |
          export SKIP_VERSION_CHECK=true; pytest scripts/cli_regression_tests.py
